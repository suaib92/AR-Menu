name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install and Build Backend
      run: |
        cd backend
        npm ci
        npm run build
        
    - name: Install and Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build
