name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend — install, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MONGO_URI: mongodb://localhost:27017/test
      JWT_SECRET: ci-test-secret-not-real
      JWT_EXPIRE: 1d
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  frontend-build:
    name: Frontend — install, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Lint (best-effort, React 19 rules pending cleanup)
        run: npm run lint
        continue-on-error: true
      - run: npm run build
